# Format:  INPUT  STREAM_NAME
#   INPUT        device path or URL
#                /dev/video0          USB camera (also add matching devices: in compose.yml)
#                rtsp://user:pass@host:port/path   network camera
#   STREAM_NAME  public name in stream URLs, e.g. rtsp://<host>:8554/STREAM_NAME

# Local cameras (USB / physically connected)
/dev/video0 livestream

# Network cameras (RTSP)
# rtsp://<username>:<password>@<ip_address>:<port>/<stream_name> ipcam0
